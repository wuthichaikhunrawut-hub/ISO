<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-main: #f8fafc;
    --bg-surface: #ffffff;
    --bg-card: #ffffff;
    --bg-input: #f1f5f9;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --text-main: #0f172a;
    --text-muted: #64748b;
    
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #06b6d4;
    
    --border-color: rgba(0, 0, 0, 0.08);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Outfit', sans-serif;
  }

  body {
    background-color: var(--bg-main);
    color: var(--text-main);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Top Navigation Bar */
  .top-nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background-color: var(--bg-surface);
    border-bottom: 1px solid var(--border-color);
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .nav-container {
    max-width: 1400px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--primary), var(--info));
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 1.1rem;
  }

  .logo-text h1 {
    font-size: 1.15rem;
    font-weight: 700;
    background: linear-gradient(135deg, #1e293b, #64748b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }

  .menu-list {
    list-style: none;
    display: flex;
    flex-direction: row;
    gap: 4px;
    align-items: center;
  }

  .menu-item {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    color: var(--text-muted);
    text-decoration: none;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 0.9rem;
    cursor: pointer;
    transition: var(--transition);
  }

  .menu-item:hover, .menu-item.active {
    color: var(--primary);
    background-color: rgba(37, 99, 235, 0.05);
  }

  .menu-item.active {
    background-color: rgba(37, 99, 235, 0.08);
    font-weight: 600;
  }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background-color: var(--bg-input);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: var(--primary);
    border: 2px solid var(--primary);
  }

  .user-info {
    overflow: hidden;
  }

  .user-name {
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    max-width: 120px;
  }

  .user-role {
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  /* Main Content Area */
  .main-content {
    margin-left: 0;
    flex-grow: 1;
    padding: 100px 24px 40px 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .page-title h2 {
    font-size: 1.75rem;
    font-weight: 700;
  }

  .page-title p {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* App Views */
  .app-view {
    display: none;
    animation: fadeIn 0.4s ease-out forwards;
  }

  .app-view.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Stat Cards */
  .dashboard-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  .stat-card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: var(--transition);
  }

  .stat-card:hover {
    transform: translateY(-4px);
    border-color: rgba(59, 130, 246, 0.3);
  }

  .stat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 500;
  }

  .stat-icon {
    padding: 8px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 700;
  }

  .stat-footer {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* Dashboard Charts / Analytics Grid */
  .analytics-grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 24px;
    margin-bottom: 32px;
  }

  @media (max-width: 1024px) {
    .analytics-grid {
      grid-template-columns: 1fr;
    }
  }

  .panel-card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 12px;
  }

  .panel-title {
    font-size: 1.1rem;
    font-weight: 600;
  }

  /* Compliance Progress Circle style */
  .compliance-wheel-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
  }

  .compliance-svg-box {
    position: relative;
    width: 160px;
    height: 160px;
  }

  .compliance-svg-circle {
    width: 160px;
    height: 160px;
    transform: rotate(-90deg);
  }

  .compliance-circle-bg {
    fill: none;
    stroke: var(--bg-input);
    stroke-width: 14;
  }

  .compliance-circle-progress {
    fill: none;
    stroke: var(--success);
    stroke-width: 14;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transition: stroke-dashoffset 1s ease-in-out;
  }

  .compliance-text-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .compliance-percent {
    font-size: 2.2rem;
    font-weight: 700;
  }

  .compliance-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Legend Indicators */
  .legend-list {
    width: 100%;
    margin-top: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }

  .indicator {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-weight: 500;
    font-size: 0.9rem;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    outline: none;
    text-decoration: none;
  }

  .btn-primary {
    background-color: var(--primary);
    color: white;
  }

  .btn-primary:hover {
    background-color: var(--primary-hover);
  }

  .btn-secondary {
    background-color: var(--bg-input);
    color: var(--text-main);
    border: 1px solid var(--border-color);
  }

  .btn-secondary:hover {
    background-color: rgba(0, 0, 0, 0.05);
  }

  .btn-danger {
    background-color: var(--danger);
    color: white;
  }

  .btn-danger:hover {
    background-color: #dc2626;
  }

  .btn-icon {
    padding: 8px;
    border-radius: var(--radius-sm);
  }

  /* Table styling */
  .table-container {
    overflow-x: auto;
    margin-top: 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    font-size: 0.9rem;
  }

  th {
    background-color: var(--bg-surface);
    padding: 16px;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-color);
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
  }

  td {
    padding: 16px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-main);
  }

  tr:last-child td {
    border-bottom: none;
  }

  tr:hover td {
    background-color: rgba(0, 0, 0, 0.015);
  }

  /* Status Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  .badge-success { background-color: rgba(16, 185, 129, 0.15); color: var(--success); }
  .badge-warning { background-color: rgba(245, 158, 11, 0.15); color: var(--warning); }
  .badge-danger { background-color: rgba(239, 68, 68, 0.15); color: var(--danger); }
  .badge-info { background-color: rgba(6, 182, 212, 0.15); color: var(--info); }
  .badge-muted { background-color: rgba(156, 163, 175, 0.15); color: var(--text-muted); }

  /* Forms & Filters Controls */
  .filters-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-box {
    position: relative;
    flex-grow: 1;
    max-width: 320px;
  }

  .search-box input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    border-radius: var(--radius-sm);
    background-color: var(--bg-surface);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    outline: none;
    transition: var(--transition);
  }

  .search-box input:focus {
    border-color: var(--primary);
  }

  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 18px;
    height: 18px;
  }

  .select-box select {
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    background-color: var(--bg-surface);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    outline: none;
    cursor: pointer;
    min-width: 160px;
  }

  /* Modal Layout */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 580px;
    box-shadow: var(--shadow);
    animation: modalSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    overflow: hidden;
  }

  @keyframes modalSlide {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-body {
    padding: 24px;
    max-height: 70vh;
    overflow-y: auto;
  }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    background-color: rgba(255, 255, 255, 0.01);
  }

  /* Grid Form */
  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius-sm);
    background-color: var(--bg-main);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    outline: none;
    transition: var(--transition);
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--primary);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* Checkbox / Multiselect Box */
  .checkbox-group {
    background-color: var(--bg-main);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 12px;
    max-height: 160px;
    overflow-y: auto;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 0.85rem;
  }

  .checkbox-item:last-child {
    margin-bottom: 0;
  }

  .checkbox-item input {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background-color: var(--bg-surface);
    border-left: 4px solid var(--primary);
    border-radius: var(--radius-sm);
    padding: 16px 24px;
    box-shadow: var(--shadow);
    z-index: 1100;
    display: flex;
    align-items: center;
    gap: 12px;
    transform: translateY(100px);
    opacity: 0;
    transition: var(--transition);
  }

  .toast.active {
    transform: translateY(0);
    opacity: 1;
  }

  .toast-success { border-left-color: var(--success); }
  .toast-danger { border-left-color: var(--danger); }
  .toast-warning { border-left-color: var(--warning); }

  /* Spinner Loader */
  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(248, 250, 252, 0.85);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.active {
    display: flex;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  .empty-state svg {
    width: 48px;
    height: 48px;
    margin-bottom: 12px;
    color: var(--bg-input);
  }
</style>
